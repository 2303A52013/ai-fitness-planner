<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diet - AI Fitness Planner</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <main class="container">
    <div class="page-header">
      <div>
        <h1>Diet</h1>
        <p>Log meals and track calorie intake.</p>
      </div>
      <button id="logout" class="logout-button">Logout</button>
    </div>

    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="diet.html">Diet</a>
      <a href="workout.html">Workout</a>
      <a href="progress.html">Progress</a>
    </nav>

    <section class="card">
      <form id="meal-form" class="inline-form">
        <div class="form-group">
          <label for="meal-name">Meal name</label>
          <input id="meal-name" type="text" placeholder="Chicken salad" required />
        </div>
        <div class="form-group">
          <label for="meal-calories">Calories</label>
          <input id="meal-calories" type="number" placeholder="450" required />
        </div>
        <button type="submit">Add meal</button>
      </form>
      <div class="table-card">
        <h2>Recent meals</h2>
        <ul id="meal-list"></ul>
      </div>
    </section>
  </main>
  <script src="../js/app.js"></script>
  <script src="../js/diet.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progress - AI Fitness Planner</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <main class="container">
    <div class="page-header">
      <div>
        <h1>Progress</h1>
        <p>Record weight and body composition updates.</p>
      </div>
      <button id="logout" class="logout-button">Logout</button>
    </div>

    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="diet.html">Diet</a>
      <a href="workout.html">Workout</a>
      <a href="progress.html">Progress</a>
    </nav>

    <section class="card">
      <form id="progress-form" class="inline-form">
        <div class="form-group">
          <label for="progress-weight">Weight (kg)</label>
          <input id="progress-weight" type="number" step="0.1" placeholder="72.5" />
        </div>
        <div class="form-group">
          <label for="progress-bodyFat">Body fat (%)</label>
          <input id="progress-bodyFat" type="number" step="0.1" placeholder="18" />
        </div>
        <div class="form-group">
          <label for="progress-notes">Notes</label>
          <textarea id="progress-notes" rows="3" placeholder="Felt stronger this week..."></textarea>
        </div>
        <button type="submit">Save progress</button>
      </form>
      <div class="table-card">
        <h2>Progress log</h2>
        <ul id="progress-list"></ul>
      </div>
    </section>
  </main>
  <script src="../js/app.js"></script>
  <script src="../js/progress.js"></script>
</body>
</html>
